<app-home></app-home>

<div class="container mt-4">
  <h2 class="mb-4">Reservation List</h2>
  
  <div *ngIf="reservations.length > 0; else noReservations" class="row">
    <div class="col-md-12">
      <div class="table-responsive">
        <table class="table table-striped table-hover">
          <thead class="table-dark">
            <tr>
              <th>Guest Name</th>
              <th>Email</th>
              <th>Room</th>
              <th>Check-in</th>
              <th>Check-out</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let reservation of reservations">
              <td>{{reservation.guestName}}</td>
              <td>{{reservation.guestEmail}}</td>
              <td>{{reservation.roomNumber}}</td>
              <td>{{reservation.checkInDate | date}}</td>
              <td>{{reservation.checkOutDate | date}}</td>
              <td>
                <button [routerLink]="['/edit', reservation.id]" class="btn btn-sm btn-primary me-2">
                  <i class="bi bi-pencil"></i> Edit
                </button>
                <button (click)="deleteReservation(reservation.id)" class="btn btn-sm btn-danger">
                  <i class="bi bi-trash"></i> Delete
                </button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <ng-template #noReservations>
    <div class="alert alert-info" role="alert">
      <i class="bi bi-info-circle"></i> No reservations available.
    </div>
  </ng-template>
</div>
